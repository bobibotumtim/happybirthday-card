<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Chúc Mừng Sinh Nhật! 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 3em;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin: 30px 0;
            animation: bounce 2s infinite;
        }

        .message {
            font-size: 1.5em;
            color: #fff;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .cats-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 40px auto;
            max-width: 1200px;
        }

        .cat {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .cat:hover {
            transform: scale(1.3) rotate(10deg);
        }

        .cat:nth-child(1) { animation-delay: 0s; }
        .cat:nth-child(2) { animation-delay: 0.5s; }
        .cat:nth-child(3) { animation-delay: 1s; }
        .cat:nth-child(4) { animation-delay: 1.5s; }
        .cat:nth-child(5) { animation-delay: 2s; }
        .cat:nth-child(6) { animation-delay: 2.5s; }
        .cat:nth-child(7) { animation-delay: 0.3s; }
        .cat:nth-child(8) { animation-delay: 0.8s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .balloons {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .balloon {
            position: absolute;
            font-size: 50px;
            animation: rise 8s infinite ease-in;
        }

        @keyframes rise {
            0% {
                bottom: -100px;
                opacity: 1;
            }
            100% {
                bottom: 100%;
                opacity: 0;
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f0f;
            position: absolute;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        .cake {
            font-size: 100px;
            margin: 30px 0;
            animation: spin 4s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 100;
            transition: transform 0.3s;
        }

        .music-control:hover {
            transform: scale(1.1);
        }

        .party-text {
            font-size: 2em;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 20px 0;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="balloons" id="balloons"></div>
    
    <div class="container">
        <h1>🎉 CHÚC MỪNG SINH NHẬT! 🎉</h1>
        
        <div class="cake">🎂</div>
        
        <div class="message">
            Chúc bạn một ngày sinh nhật thật vui vẻ và hạnh phúc! 🎈
        </div>

        <div class="party-text">
            ✨ PARTY TIME! ✨
        </div>

        <div class="cats-container">
            <div class="cat" onclick="meow()">😺</div>
            <div class="cat" onclick="meow()">😸</div>
            <div class="cat" onclick="meow()">😻</div>
            <div class="cat" onclick="meow()">😽</div>
            <div class="cat" onclick="meow()">🐱</div>
            <div class="cat" onclick="meow()">😹</div>
            <div class="cat" onclick="meow()">😼</div>
            <div class="cat" onclick="meow()">😿</div>
            <div class="cat" onclick="meow()">😺</div>
            <div class="cat" onclick="meow()">😸</div>
            <div class="cat" onclick="meow()">😻</div>
            <div class="cat" onclick="meow()">🐈</div>
        </div>

        <div class="message">
            🎁 Click vào mèo để nghe tiếng kêu nhé! 🎁
        </div>
    </div>

    <div class="music-control" onclick="toggleMusic()">
        <span id="music-icon">🎵 Bật nhạc</span>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Tạo bóng bay
        function createBalloons() {
            const balloons = document.getElementById('balloons');
            const balloonEmojis = ['🎈', '🎉', '🎊', '🎁', '⭐', '✨', '💝', '🌟'];
            
            setInterval(() => {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.textContent = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
                balloon.style.left = Math.random() * 100 + '%';
                balloon.style.animationDuration = (Math.random() * 3 + 5) + 's';
                balloons.appendChild(balloon);
                
                setTimeout(() => {
                    balloon.remove();
                }, 8000);
            }, 500);
        }

        // Tạo confetti
        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            
            setInterval(() => {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }, 100);
        }

        // Tiếng mèo kêu
        function meow() {
            const meowSounds = [
                'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGGS57OihUBELTKXh8bllHAU2jdXvzn0pBSh+zPDajzsKElyx6OyrWBQLSKHf8sFuIwUrgc7y2Yk2CBhkuezooVARDEyl4fG5ZRwFNo3V7859KQUofsz',
            ];
            
            // Tạo âm thanh mèo kêu đơn giản
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800 + Math.random() * 400;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // Điều khiển nhạc nền
        let musicPlaying = false;
        const bgMusic = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('music-icon');

        function toggleMusic() {
            if (musicPlaying) {
                bgMusic.pause();
                musicIcon.textContent = '🎵 Bật nhạc';
                musicPlaying = false;
            } else {
                bgMusic.play();
                musicIcon.textContent = '🔇 Tắt nhạc';
                musicPlaying = true;
            }
        }

        // Tự động phát nhạc khi load (một số trình duyệt chặn autoplay)
        window.addEventListener('click', function() {
            if (!musicPlaying) {
                bgMusic.play().then(() => {
                    musicPlaying = true;
                    musicIcon.textContent = '🔇 Tắt nhạc';
                }).catch(e => {
                    console.log('Autoplay prevented');
                });
            }
        }, { once: true });

        // Khởi động hiệu ứng
        createBalloons();
        createConfetti();

        // Thêm hiệu ứng pháo hoa khi click
        document.addEventListener('click', function(e) {
            const firework = document.createElement('div');
            firework.style.position = 'fixed';
            firework.style.left = e.clientX + 'px';
            firework.style.top = e.clientY + 'px';
            firework.style.fontSize = '30px';
            firework.textContent = '✨';
            firework.style.pointerEvents = 'none';
            firework.style.zIndex = '1000';
            document.body.appendChild(firework);
            
            setTimeout(() => firework.remove(), 1000);
        });
    </script>
</body>
</html>
